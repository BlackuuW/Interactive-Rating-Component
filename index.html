<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Interactive rating component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section id="main">
    <img src="images/icon-star.svg" alt="icon-star" id="icon-star"><br>

    <h1>How did we do?</h1><br>

    <h4>Please let us know how we did with your support request. All feedback is appreciated to help us improve our offering!</h4><br>
    
    <form id="rating">
      <label id="labelOne"><input type="radio" id="one" value="1" name="ratingOption">1</label>
      <label><input type="radio" id="two" value="2" name="ratingOption">2</label>
      <label><input type="radio" id="three" value="3" name="ratingOption">3</label>
      <label><input type="radio" id="four" value="4" name="ratingOption">4</label>
      <label id="labelFive"><input type="radio" id="five" value="5" name="ratingOption">5</label><br>
    </form><br>

    <button id="submit">Submit</button>
  </section>

  <section id="thank_you">
    <img src="images/illustration-thank-you.svg" alt="illustration-thank-you" id="illustration-thank-you"><br>

    <p id="selection"></p>

    <h1>Thank you!</h1>

    <h4>We appreciate you taking the time to give a rating. If you ever need more support, don’t hesitate to get in touch!</h4>
  
  </section>

  <script src="script.js"></script>
</body>
</html>
